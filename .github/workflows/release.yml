name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build shaded CLI JAR
        run: mvn -pl upgrd-cli -am package -DskipTests -B

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          JAR="upgrd-cli/target/upgrd.jar"
          gh release create "$TAG" "$JAR" \
            --title "UpGrd ${TAG#v}" \
            --notes "Edge-local Java modernization CLI. Run with \`java -jar upgrd.jar --help\`."
